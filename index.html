<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cosmophonix Production</title>
  <meta name="description" content="Cosmophonix Production" />
  <meta name="theme-color" content="#000000" />
  <style>
    :root{
      --bg:#000000;
      --text:#f5f1e8;
      --soft:rgba(245,241,232,.62);
      --line:rgba(255,255,255,.14);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:var(--bg);
      color:var(--text);
      font-family:"Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    main{
      width:min(100vw - 32px, 720px);
      display:grid;
      justify-items:center;
      gap:18px;
      text-align:center;
    }

    .logo{
      width:min(100%, 520px);
    }

    .logo img{
      width:100%;
      height:auto;
      display:block;
    }

    h1{
      margin:0;
      font-size:clamp(34px, 8vw, 78px);
      font-weight:700;
      letter-spacing:.18em;
      text-transform:uppercase;
      line-height:.94;
    }

    p{
      margin:0;
      color:var(--soft);
      font-size:12px;
      letter-spacing:.2em;
      text-transform:uppercase;
    }

    a{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:48px;
      padding:0 20px;
      border:1px solid var(--line);
      border-radius:999px;
      color:var(--text);
      text-decoration:none;
      font-size:11px;
      font-weight:700;
      letter-spacing:.18em;
      text-transform:uppercase;
    }
  </style>
</head>
<body>
  <main>
    <div class="logo" aria-label="Cosmophonix Production">
      <img src="./assets/logo-cosmophonix.svg" alt="Cosmophonix Production" />
    </div>
    <p>Coming soon</p>
    <a href="mailto:commerciale@cosmophonix.com">commerciale@cosmophonix.com</a>
  </main>
</body>
</html>
